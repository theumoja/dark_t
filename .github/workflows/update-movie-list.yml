name: Update movie list from Hugging Face
 
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:                # <-- add this block
      contents: write           # allow pushing commits
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate movie_list.json
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: node scripts/generate-movie-list.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add movie_list.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update movie_list.json [skip ci]" && git push)
